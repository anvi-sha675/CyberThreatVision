<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <title>CyberThreatVision</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        height: 100%;
        background: #050a0f;
        overflow: hidden;
      }
      body {
        font-family: "Rajdhani", sans-serif;
        color: #c8d8e8;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: #050a0f;
        z-index: 9999;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #3a5a74;
        letter-spacing: 2px;
        transition: opacity 0.4s;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-ring {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid rgba(0, 220, 180, 0.15);
        border-top-color: #00dcb4;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-ring"></div>
      INITIALIZING CYBERTHREATVSION...
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.__onAppReady = () => {
        const l = document.getElementById("app-loader");
        if (l) {
          l.classList.add("hidden");
          setTimeout(() => l.remove(), 500);
        }
      };
    </script>
  </body>
</html>
